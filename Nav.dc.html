<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;menu&quot;,&quot;about&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  linkStyle(active) {
    return {
      fontFamily: "var(--font-body)",
      fontWeight: 600,
      fontSize: "15px",
      letterSpacing: "0.01em",
      textDecoration: "none",
      paddingBottom: "3px",
      borderBottom: active ? "2px solid var(--color-primary)" : "2px solid transparent",
      color: active ? "var(--color-primary)" : "var(--text-strong)",
      transition: "color 140ms ease, border-color 140ms ease",
      whiteSpace: "nowrap"
    };
  }
  renderVals() {
    const a = this.props.active || "home";
    return {
      homeStyle: this.linkStyle(a === "home"),
      menuStyle: this.linkStyle(a === "menu"),
      aboutStyle: this.linkStyle(a === "about"),
      contactStyle: this.linkStyle(a === "contact")
    };
  }
}
</script>
